name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            name: h41-macos-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: h41-macos-arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: h41-linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: h41-linux-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: h41-windows-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz h41
          cd ../../..

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/h41.exe" -DestinationPath "${{ matrix.name }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            h41-macos-x64.tar.gz
            h41-macos-arm64.tar.gz
            h41-linux-x64.tar.gz
            h41-linux-arm64.tar.gz
            h41-windows-x64.zip

  update-tap:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate formula and cask from artifacts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          
          # Formula (source build)
          cp Formula/h41.rb.template Formula/h41.rb
          SOURCE_SHA=$(curl -sL "https://github.com/9h41/h41/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz" | sha256sum | cut -d' ' -f1)
          sed -i "s/\${SHA256_SOURCE}/${SOURCE_SHA}/" Formula/h41.rb
          sed -i "s/\${VERSION}/${VERSION}/" Formula/h41.rb

          # Cask (prebuilt binary)
          cp Casks/h41.rb.template Casks/h41.rb
          for pair in \
            "SHA256_MACOS_ARM64:h41-macos-arm64.tar.gz" \
            "SHA256_MACOS_X64:h41-macos-x64.tar.gz"; do
            key="${pair%%:*}"
            file="${pair#*:}"
            sha=$(sha256sum "$file" | cut -d' ' -f1)
            sed -i "s/\${${key}}/${sha}/" Casks/h41.rb
          done
          sed -i "s/\${VERSION}/${VERSION}/" Casks/h41.rb

      - name: Commit and push formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/h41.rb Casks/h41.rb
          git commit -m "Update formula and cask for ${{ github.ref_name }}"
          git pull --rebase origin main
          git push origin main

  update-scoop:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: h41-windows-x64

      - name: Generate Scoop manifest
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          WIN_SHA=$(sha256sum h41-windows-x64.zip | cut -d' ' -f1)
          cp Scoop/h41.json.template Scoop/h41.json
          sed -i "s/\${VERSION}/${VERSION}/" Scoop/h41.json
          sed -i "s/\${SHA256_WINDOWS_X64}/${WIN_SHA}/" Scoop/h41.json

      - name: Commit and push Scoop manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Scoop/h41.json
          git commit -m "Update Scoop manifest for ${{ github.ref_name }}"
          git pull --rebase origin main
          git push origin main
